name: release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger from the Actions tab. Builds across all platforms but
  # uploads as workflow artefacts instead of attaching to a GitHub Release —
  # useful for verifying the matrix builds cleanly before cutting a tag.
  workflow_dispatch:

permissions:
  contents: write

# Opt the JS-based actions (checkout, cache, upload-artifact, action-gh-release)
# into Node.js 24 ahead of the June 2026 default switch. Drop this once the
# actions ship versions that default to Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: nerdterm
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            bin: nerdterm
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            bin: nerdterm
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: nerdterm.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package binary + checksum
        shell: bash
        run: |
          set -e
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"
          cd dist
          ARCHIVE="nerdterm-${{ matrix.target }}.${{ matrix.archive }}"
          case "${{ matrix.archive }}" in
            zip)
              # 7z is preinstalled on the windows-latest runner. Git Bash
              # there ships sha256sum (MSYS2 coreutils) but not shasum.
              7z a "$ARCHIVE" "${{ matrix.bin }}" >/dev/null
              sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
              ;;
            tar.gz)
              # macOS lacks GNU sha256sum by default; shasum -a 256 is the
              # cross-platform option for the Linux/macOS runners. Output
              # format is byte-identical to sha256sum so verification works
              # the same regardless of which side generated the .sha256.
              tar -czf "$ARCHIVE" "${{ matrix.bin }}"
              shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
              ;;
          esac
          ls -la

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nerdterm-${{ matrix.target }}.${{ matrix.archive }}
            dist/nerdterm-${{ matrix.target }}.${{ matrix.archive }}.sha256
          fail_on_unmatched_files: true

      - name: Upload as workflow artefact (dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: nerdterm-${{ matrix.target }}
          path: |
            dist/nerdterm-${{ matrix.target }}.${{ matrix.archive }}
            dist/nerdterm-${{ matrix.target }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
