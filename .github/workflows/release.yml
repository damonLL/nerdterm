name: release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger from the Actions tab. Builds across all platforms but
  # uploads as workflow artefacts instead of attaching to a GitHub Release —
  # useful for verifying the matrix builds cleanly before cutting a tag.
  workflow_dispatch:

permissions:
  contents: write

# Opt the JS-based actions (checkout, cache, upload-artifact, action-gh-release)
# into Node.js 24 ahead of the June 2026 default switch. Drop this once the
# actions ship versions that default to Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package binary + checksum
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/nerdterm dist/nerdterm
          cd dist
          tar -czf "nerdterm-${{ matrix.target }}.tar.gz" nerdterm
          shasum -a 256 "nerdterm-${{ matrix.target }}.tar.gz" > "nerdterm-${{ matrix.target }}.tar.gz.sha256"
          ls -la

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nerdterm-${{ matrix.target }}.tar.gz
            dist/nerdterm-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: true

      - name: Upload as workflow artefact (dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: nerdterm-${{ matrix.target }}
          path: |
            dist/nerdterm-${{ matrix.target }}.tar.gz
            dist/nerdterm-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
