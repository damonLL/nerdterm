name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package binary + checksum
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/nerdterm dist/nerdterm
          cd dist
          tar -czf "nerdterm-${{ matrix.target }}.tar.gz" nerdterm
          shasum -a 256 "nerdterm-${{ matrix.target }}.tar.gz" > "nerdterm-${{ matrix.target }}.tar.gz.sha256"
          ls -la

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nerdterm-${{ matrix.target }}.tar.gz
            dist/nerdterm-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: true
